<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM — ดูหนังออนไลน์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;
  --bg-2:#1c1c1c;
  --bg-3:#272727;
  --hover:#3f3f3f;
  --text:#f1f1f1;
  --muted:#aaaaaa;
  --muted-2:#717171;
  --gold:#d4af37;
  --gold-bright:#ffe08a;
  --gold-deep:#a8842a;
  --line:rgba(255,255,255,.12);
  --red:#ff4d4d;
  --topbar-h:56px;
  --side-w:240px;
  --ease:cubic-bezier(.2,.7,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Roboto',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
body.no-scroll{overflow:hidden}
::selection{background:var(--gold);color:#000}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input{font-family:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#383838;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#555}
.serif{font-family:'Playfair Display',serif}

/* ============ TOP BAR ============ */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:200;display:flex;align-items:center;
  gap:16px;padding:0 16px;background:var(--bg)}
.tb-left{display:flex;align-items:center;gap:14px;min-width:170px}
.icon-btn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:var(--text);
  transition:background .2s;flex:none}
.icon-btn:hover{background:var(--bg-3)}
.logo{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:700;letter-spacing:.06em}
.logo .mark{width:28px;height:28px;border-radius:50%;flex:none;
  background:conic-gradient(from 210deg,var(--gold-deep),var(--gold-bright),var(--gold),var(--gold-deep));
  box-shadow:0 0 12px rgba(212,175,55,.45);display:grid;place-items:center}
.logo .mark span{font-family:'Playfair Display',serif;color:#1a1407;font-size:16px;font-weight:900;font-style:italic}
.logo .word{background:linear-gradient(180deg,#fff,var(--gold-bright));-webkit-background-clip:text;background-clip:text;color:transparent}
.tb-center{flex:1;display:flex;justify-content:center;max-width:680px;margin:0 auto}
.searchbar{display:flex;flex:1;max-width:560px}
.searchbar input{flex:1;background:#121212;border:1px solid #303030;border-right:none;border-radius:40px 0 0 40px;
  padding:10px 18px;color:var(--text);font-size:16px;outline:none}
.searchbar input:focus{border-color:var(--gold)}
.searchbar input::placeholder{color:var(--muted-2)}
.searchbar .go{width:64px;background:var(--bg-3);border:1px solid #303030;border-radius:0 40px 40px 0;
  display:grid;place-items:center;color:var(--text);transition:background .2s}
.searchbar .go:hover{background:var(--hover)}
.mic{width:40px;height:40px;border-radius:50%;background:var(--bg-3);display:grid;place-items:center;margin-left:10px;
  transition:background .2s;flex:none}
.mic:hover{background:var(--hover)}
.tb-right{display:flex;align-items:center;gap:8px;min-width:170px;justify-content:flex-end}
.avatar{width:34px;height:34px;border-radius:50%;flex:none;background:linear-gradient(135deg,#3a3a44,#1a1a20);
  border:1.5px solid var(--gold);display:grid;place-items:center;font-weight:700;color:var(--gold-bright);font-size:15px}
.search-icon-mobile{display:none}

/* ============ SIDEBAR ============ */
.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--side-w);overflow-y:auto;
  padding:12px 12px 30px;z-index:150;background:var(--bg);transition:transform .25s var(--ease)}
.sidebar::-webkit-scrollbar{width:8px}
.side-sec{padding:8px 0;border-bottom:1px solid var(--line)}
.side-sec:last-child{border:none}
.side-link{display:flex;align-items:center;gap:22px;padding:9px 12px;border-radius:10px;font-size:14px;
  transition:background .2s;cursor:pointer}
.side-link:hover{background:var(--bg-3)}
.side-link.active{background:var(--bg-3);font-weight:500}
.side-link.active svg{color:var(--gold-bright)}
.side-link svg{flex:none;color:var(--text)}
.side-head{font-size:14px;font-weight:500;padding:8px 12px 6px;color:var(--text);display:flex;align-items:center;gap:8px}
.side-cat{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);padding:10px 12px 4px}

/* ============ MAIN ============ */
.main{margin-top:var(--topbar-h);margin-left:var(--side-w);transition:margin-left .25s var(--ease)}
body.side-collapsed .sidebar{transform:translateX(-100%)}
body.side-collapsed .main{margin-left:0}
body.view-watch .sidebar{transform:translateX(-100%)}
body.view-watch .main{margin-left:0}

/* ============ CHIP BAR ============ */
.chipbar-wrap{position:sticky;top:var(--topbar-h);z-index:100;background:var(--bg)}
.chipbar{display:flex;gap:12px;padding:12px 24px;overflow-x:auto;scrollbar-width:none}
.chipbar::-webkit-scrollbar{display:none}
.chip{flex:none;padding:8px 14px;border-radius:9px;background:var(--bg-3);font-size:14px;font-weight:500;
  white-space:nowrap;transition:.2s;border:1px solid transparent}
.chip:hover{background:var(--hover)}
.chip.active{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#1a1407;font-weight:700}

/* ============ VIDEO GRID ============ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px 16px;padding:8px 24px 60px}
.vcard{cursor:pointer}
.vthumb{position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;transition:border-radius .2s}
.vthumb .grad{position:absolute;inset:0}
.vthumb .grad::after{content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 28% 22%,rgba(255,255,255,.16),transparent 55%)}
.vthumb .badge-dur{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.82);color:#fff;
  font-size:12px;font-weight:500;padding:2px 5px;border-radius:5px;letter-spacing:.02em}
.vthumb .badge-q{position:absolute;left:8px;top:8px;background:rgba(212,175,55,.92);color:#1a1407;
  font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:5px}
.vthumb .hover-play{position:absolute;inset:0;background:rgba(0,0,0,.35);display:grid;place-items:center;
  opacity:0;transition:.25s}
.vcard:hover .hover-play{opacity:1}
.vcard:hover .vthumb{border-radius:0}
.hover-play .pp{width:54px;height:54px;border-radius:50%;background:rgba(212,175,55,.95);display:grid;place-items:center;color:#1a1407}
.vmeta{display:flex;gap:12px;margin-top:12px}
.chan-av{width:36px;height:36px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#fff;border:1px solid var(--line)}
.vinfo{min-width:0}
.vtitle{font-size:15px;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.vchannel{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px}
.vchannel .vc-check{color:var(--muted-2)}
.vstats{font-size:13px;color:var(--muted)}

/* ============ WATCH PAGE ============ */
.watch{display:none;max-width:1700px;margin:0 auto;padding:24px 24px 80px;gap:24px;
  grid-template-columns:minmax(0,1fr) 402px}
body.view-watch .watch{display:grid}
body.view-watch .home{display:none}

.player-col{min-width:0}
.video-stage{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden}
.video-stage.theater{border-radius:0;width:100vw;margin-left:calc(-24px - (100vw - 100%)/2 + 24px)}
.video-stage video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
.poster-fb{position:absolute;inset:0;z-index:1;display:grid;place-items:center;transition:opacity .5s}
.poster-fb.hidden{opacity:0;pointer-events:none}
.poster-fb .pg{position:absolute;inset:0}
.poster-fb::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.3)}
.big-play{position:relative;z-index:2;width:84px;height:84px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#1a1407;display:grid;place-items:center;
  box-shadow:0 10px 36px rgba(0,0,0,.6);transition:transform .25s}
.big-play:hover{transform:scale(1.08)}
.cap-box{position:absolute;left:0;right:0;bottom:84px;z-index:3;text-align:center;pointer-events:none;display:none}
.cap-box.show{display:block}
.cap-box span{background:rgba(0,0,0,.75);padding:5px 14px;border-radius:7px;font-size:clamp(13px,1.6vw,19px)}

.controls{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:14px 14px 10px;
  background:linear-gradient(0deg,rgba(0,0,0,.9),transparent);opacity:0;transition:opacity .3s}
.video-stage:hover .controls,.controls.show{opacity:1}
.progress{position:relative;height:5px;background:rgba(255,255,255,.25);border-radius:4px;cursor:pointer;margin-bottom:8px}
.progress .filled{position:absolute;left:0;top:0;height:100%;width:0;border-radius:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold-bright))}
.progress .knob{position:absolute;top:50%;left:0;width:13px;height:13px;border-radius:50%;background:var(--gold-bright);
  transform:translate(-50%,-50%) scale(0);transition:transform .15s;box-shadow:0 1px 6px rgba(0,0,0,.6)}
.progress:hover{height:7px}
.progress:hover .knob{transform:translate(-50%,-50%) scale(1)}
.ctrl-row{display:flex;align-items:center;gap:14px}
.ctrl-row .spacer{margin-left:auto}
.cbtn{display:grid;place-items:center;color:#fff;transition:.2s;border-radius:6px;padding:4px}
.cbtn:hover{color:var(--gold-bright)}
.cbtn.active{color:var(--gold-bright)}
.time{font-size:13px;color:#eee;font-variant-numeric:tabular-nums}
.vol{display:flex;align-items:center;gap:6px}
.vol input{width:0;opacity:0;transition:.3s;accent-color:var(--gold);cursor:pointer}
.vol:hover input{width:70px;opacity:1}
.menu{position:relative}
.menu-pop{position:absolute;bottom:46px;right:0;background:rgba(28,28,28,.98);border:1px solid var(--line);
  border-radius:12px;padding:6px;min-width:150px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.menu-pop.open{display:block}
.menu-pop .mt{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);padding:6px 12px}
.menu-pop button{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 12px;
  border-radius:8px;font-size:14px;color:var(--text);transition:.15s}
.menu-pop button:hover{background:var(--hover)}
.menu-pop button.sel{color:var(--gold-bright)}
.menu-pop button.sel::after{content:"✓"}

/* watch info */
.w-title{font-size:20px;font-weight:700;line-height:1.35;margin:16px 0 4px}
.w-en{font-size:14px;color:var(--muted);letter-spacing:.06em;margin-bottom:14px}
.channel-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ch-block{display:flex;align-items:center;gap:12px;margin-right:auto}
.ch-av{width:42px;height:42px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#fff;border:1px solid var(--line)}
.ch-name{font-size:15px;font-weight:500;display:flex;align-items:center;gap:5px}
.ch-subs{font-size:12px;color:var(--muted)}
.subscribe{padding:9px 18px;border-radius:40px;background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  color:#1a1407;font-weight:700;font-size:14px;transition:.2s}
.subscribe:hover{filter:brightness(1.08)}
.subscribe.subbed{background:var(--bg-3);color:var(--text)}
.subscribe.subbed:hover{background:var(--hover)}

.actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:40px;background:var(--bg-3);
  font-size:14px;font-weight:500;transition:.2s;white-space:nowrap}
.pill:hover{background:var(--hover)}
.pill svg{flex:none}
.like-pill{display:inline-flex;align-items:center;background:var(--bg-3);border-radius:40px;overflow:hidden}
.like-pill button{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;font-size:14px;font-weight:500;transition:.2s}
.like-pill button:hover{background:var(--hover)}
.like-pill .lk.on{color:var(--gold-bright)}
.like-pill .lk.on svg{fill:var(--gold-bright)}
.like-pill .dk.on{color:var(--red)}
.like-pill .sep{width:1px;height:22px;background:var(--line)}
.pill.saved{color:var(--gold-bright)}
.pill.saved svg{fill:var(--gold-bright)}

/* description box */
.descbox{background:var(--bg-2);border-radius:12px;padding:14px 16px;margin-top:16px;font-size:14px;cursor:pointer;
  transition:background .2s}
.descbox:hover{background:#222}
.desc-stats{font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live-pill{display:inline-flex;align-items:center;gap:6px;color:var(--red);font-weight:700;font-size:13px}
.live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--red);
  box-shadow:0 0 0 0 rgba(255,77,77,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,77,.6)}70%{box-shadow:0 0 0 8px rgba(255,77,77,0)}100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}}
.desc-body{line-height:1.6;color:#e4e4e4;white-space:pre-line;overflow:hidden}
.desc-body:not(.open){display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.desc-tags{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px}
.tag{color:var(--gold-bright);font-size:14px;font-weight:500}
.desc-more{color:var(--text);font-weight:600;margin-top:8px;font-size:14px}

/* comments */
.comments{margin-top:28px}
.cmt-head{display:flex;align-items:center;gap:16px;font-size:18px;font-weight:700;margin-bottom:22px}
.cmt-input-row{display:flex;gap:14px;margin-bottom:30px}
.cmt-av{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:700;
  font-size:15px;color:#fff}
.cmt-input{flex:1}
.cmt-input input{width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:6px 2px;
  color:var(--text);font-size:14px;outline:none}
.cmt-input input:focus{border-color:var(--gold)}
.cmt-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
.cmt-btns button{padding:9px 16px;border-radius:40px;font-size:14px;font-weight:500}
.cmt-cancel{color:var(--muted)}
.cmt-send{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#1a1407;font-weight:700}
.cmt{display:flex;gap:14px;margin-bottom:20px}
.cmt-body .cmt-top{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.cmt-name{font-size:13px;font-weight:500}
.cmt-time{font-size:12px;color:var(--muted)}
.cmt-text{font-size:14px;line-height:1.5;color:#e8e8e8}
.cmt-acts{display:flex;align-items:center;gap:16px;margin-top:7px;color:var(--muted);font-size:12px}
.cmt-acts span{display:flex;align-items:center;gap:5px;cursor:pointer;transition:color .2s}
.cmt-acts span:hover{color:var(--text)}

/* right rail */
.rail{display:flex;flex-direction:column;gap:8px}
.rail-head{font-size:15px;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.rail-head .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.rrow{display:flex;gap:8px;cursor:pointer;padding:6px;border-radius:10px;transition:background .2s}
.rrow:hover{background:var(--bg-2)}
.rthumb{position:relative;width:168px;aspect-ratio:16/9;border-radius:9px;overflow:hidden;flex:none}
.rthumb .grad{position:absolute;inset:0}
.rthumb .badge-dur{position:absolute;right:5px;bottom:5px;background:rgba(0,0,0,.82);color:#fff;font-size:11px;
  padding:1px 4px;border-radius:4px}
.rinfo{min-width:0;padding-top:2px}
.rttl{font-size:14px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.rchan{font-size:12px;color:var(--muted)}
.rstat{font-size:12px;color:var(--muted)}

/* mobile bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:54px;z-index:200;
  background:var(--bg);border-top:1px solid var(--line);justify-content:space-around;align-items:center}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);padding:4px 10px}
.bn-item.active{color:var(--text)}
.bn-item.active svg{color:var(--gold-bright)}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);z-index:300;
  background:rgba(28,28,28,.98);border:1px solid var(--gold);padding:13px 22px;border-radius:40px;font-size:14px;
  font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:0 8px 30px rgba(0,0,0,.5);
  opacity:0;transition:.35s var(--ease);color:var(--gold-bright)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* mobile drawer overlay */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:140;opacity:0;visibility:hidden;transition:.25s}
.scrim.show{opacity:1;visibility:visible}

/* ============ RESPONSIVE ============ */
@media(max-width:1280px){
  .watch{grid-template-columns:1fr;max-width:1000px}
  .rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .rrow{flex-direction:column;padding:0}
  .rthumb{width:100%}
}
@media(max-width:1000px){
  body:not(.side-collapsed) .sidebar{transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.6)}
  body:not(.side-collapsed) .main{margin-left:0}
  /* on tablet, sidebar floats over content; default collapsed */
}
@media(min-width:1001px){.scrim{display:none}}
@media(max-width:768px){
  :root{--topbar-h:54px}
  .tb-center{display:none}
  .search-icon-mobile{display:grid}
  .tb-left{min-width:auto}
  .tb-right{min-width:auto;gap:4px}
  .menu-burger{display:grid}
  .logo{font-size:19px}
  .sidebar{width:260px}
  .main{margin-left:0!important}
  .sidebar{transform:translateX(-100%)}
  body.mside-open .sidebar{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.7)}
  .grid{grid-template-columns:1fr;padding:6px 0 70px;gap:18px 0}
  .vthumb{border-radius:0}
  .vmeta{padding:0 12px}
  .chipbar{padding:10px 12px}
  .watch{padding:0 0 80px;gap:16px}
  .video-stage{border-radius:0;position:sticky;top:var(--topbar-h);z-index:90}
  .video-stage.theater{margin-left:0;width:100%}
  .w-title,.w-en,.channel-row,.descbox,.comments,.rail,.rail-head{padding-left:12px;padding-right:12px}
  .w-title{margin-top:14px}
  .actions{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;padding-bottom:4px}
  .actions::-webkit-scrollbar{display:none}
  .channel-row{padding-top:0}
  .rail{grid-template-columns:1fr}
  .rrow{flex-direction:row;padding:6px 12px}
  .rthumb{width:160px}
  .bottom-nav{display:flex}
  .toast{bottom:68px}
  body.view-watch .bottom-nav{display:none}
}
@media(max-width:480px){
  .rthumb{width:140px}
  .big-play{width:64px;height:64px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
</style>
</head>
<body class="view-home">

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <div class="tb-left">
    <button class="icon-btn menu-burger" onclick="toggleSidebar()" aria-label="เมนู">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <a class="logo" href="#" onclick="goHome(event)">
      <span class="mark"><span>A</span></span><span class="word">AURUM</span>
    </a>
  </div>
  <div class="tb-center">
    <div class="searchbar">

/* ============ HELPERS ============ */
let currentIdx=0,viewInterval=null,liveInterval=null;
const liked={},disliked={},saved={},subbed={};
let activeChip=0,activeGenreFilter=null;

function vfmt(n){if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return n;}
function avGrad(seed){const a=movies[seed%movies.length].grad[0],b=movies[(seed+2)%movies.length].grad[1];return G(a,b);}

/* ============ HOME GRID ============ */
const chips=["ทั้งหมด","มาใหม่","ยอดนิยม","แอ็คชั่น","ไซไฟ","โรแมนติก","ดราม่า","ระทึกขวัญ","4K HDR","AURUM Original"];
function buildChips(){
  document.getElementById('chipbar').innerHTML=chips.map((c,i)=>
    `<button class="chip ${i===0?'active':''}" onclick="filterChip(${i})">${c}</button>`).join('');
}
function filterChip(i){
  activeChip=i;activeGenreFilter=null;
  document.querySelectorAll('.chip').forEach((c,ci)=>c.classList.toggle('active',ci===i));
  renderGrid();
  document.querySelector('.main').scrollTo?.(0,0);window.scrollTo(0,0);
}
function filterGenre(g){
  goHome();
  const i=chips.indexOf(g);
  if(i>=0)filterChip(i);
}
function getFiltered(){
  const c=chips[activeChip];
  let list=movies.map((m,i)=>({m,i}));
  if(c==="มาใหม่")list=[...list].sort((a,b)=>parseInt(a.m.up)-parseInt(b.m.up));
  else if(c==="ยอดนิยม")list=[...list].sort((a,b)=>b.m.views-a.m.views);
  else if(c==="4K HDR"||c==="AURUM Original"){/* all qualify */}
  else if(c!=="ทั้งหมด")list=list.filter(o=>o.m.genre===c);
  return list;
}
function vcardHTML(m,i){return `
  <div class="vcard" onclick="openWatch(${i})">
    <div class="vthumb">
      <div class="grad" style="background:${G(m.grad[0],m.grad[1])}"></div>
      <div class="badge-q">4K</div>
      <div class="badge-dur">${m.dur}</div>
      <div class="hover-play"><span class="pp"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></div>
    </div>
    <div class="vmeta">
      <div class="chan-av" style="background:${avGrad(m.ch)}">${studios[m.ch].charAt(0)}</div>
      <div class="vinfo">
        <div class="vtitle">${m.th} · ${m.en}</div>
        <div class="vchannel">${studios[m.ch]} <span class="vc-check">✓</span></div>
        <div class="vstats">${vfmt(m.views)} ครั้ง · ${m.up}</div>
      </div>
    </div>
  </div>`;}
function renderGrid(){
  const list=getFiltered();
  document.getElementById('grid').innerHTML=list.map(o=>vcardHTML(o.m,o.i)).join('')
    || '<p style="color:var(--muted);padding:40px">ไม่พบวิดีโอในหมวดนี้</p>';
}

/* ============ NAVIGATION ============ */
function goHome(e){if(e&&e.preventDefault)e.preventDefault();
  stopPlayer();document.body.classList.remove('view-watch');document.body.classList.add('view-home');
  document.querySelectorAll('.bn-item').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelector('[data-side="home"]').classList.add('active');
  window.scrollTo(0,0);closeMobileSidebar();
}
function goLibrary(type){
  goHome();
  activeChip=-1;activeGenreFilter=null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  const ids=Object.keys(type==='saved'?saved:liked).filter(k=>(type==='saved'?saved:liked)[k]).map(Number);
  const list=ids.map(i=>({m:movies[i],i}));
  document.getElementById('grid').innerHTML=list.length?list.map(o=>vcardHTML(o.m,o.i)).join('')
    :`<p style="color:var(--muted);padding:40px">ยังไม่มีรายการ${type==='saved'?'ที่บันทึกไว้':'ที่ถูกใจ'} — กดปุ่ม${type==='saved'?'บันทึก':'ถูกใจ'}ในหน้าดูหนังเพื่อเพิ่ม</p>`;
  toast(type==='saved'?'รายการดูภายหลัง':'วิดีโอที่ถูกใจ');
}

function openWatch(idx){
  currentIdx=idx;const m=movies[idx];
  document.getElementById('wTitle').textContent=`${m.th} (${m.en})`;
  document.getElementById('wEn').textContent=`${m.genre} · ${m.year} · ${m.dur} · ความคมชัด 4K HDR`;
  document.getElementById('posterGrad').style.background=G(m.grad[0],m.grad[1]);
  document.getElementById('chAv').style.background=avGrad(m.ch);
  document.getElementById('chAv').textContent=studios[m.ch].charAt(0);
  document.getElementById('chName').innerHTML=`${studios[m.ch]} <span style="color:var(--muted-2)">✓</span>`;
  document.getElementById('chSubs').textContent=`ผู้ติดตาม ${m.subs} คน`;
  document.getElementById('likeCount').textContent=vfmt(m.likes);
  document.getElementById('descTime').textContent=m.up;
  document.getElementById('descBody').textContent=m.syn;
  document.getElementById('descBody').classList.remove('open');
  document.getElementById('descMore').textContent='...เพิ่มเติม';
  document.getElementById('descMore').style.display='block';
  document.getElementById('descTags').innerHTML=m.tags.map(t=>`<span class="tag">${t}</span>`).join('');

  // subscribe / like / save state
  updateSubUI();updateLikeUI();updateSaveUI();

  // comments
  document.getElementById('cmtCount').textContent=`${(Math.floor(m.views/420)).toLocaleString('th-TH')} ความคิดเห็น`;
  renderComments();

  // right rail (recommended: popular others)
  const recos=movies.map((_,i)=>i).filter(i=>i!==idx)
    .sort((a,b)=>movies[b].views-movies[a].views).slice(0,8);
  document.getElementById('railList').innerHTML=recos.map(i=>{const r=movies[i];return `
    <div class="rrow" onclick="openWatch(${i})">
      <div class="rthumb"><div class="grad" style="background:${G(r.grad[0],r.grad[1])}"></div><div class="badge-dur">${r.dur}</div></div>
      <div class="rinfo"><div class="rttl">${r.th} · ${r.en}</div><div class="rchan">${studios[r.ch]} ✓</div><div class="rstat">${vfmt(r.views)} ครั้ง · ${r.up}</div></div>
    </div>`;}).join('');

  startCounters(m.views);
  resetPlayerUI();
  document.body.classList.remove('view-home');document.body.classList.add('view-watch');
  window.scrollTo(0,0);closeMobileSidebar();
}

/* ============ COUNTERS ============ */
function startCounters(base){
  stopCounters();
  let v=base;document.getElementById('descViews').textContent=v.toLocaleString('th-TH')+' ครั้ง';
  viewInterval=setInterval(()=>{v+=Math.floor(Math.random()*30)+4;
    document.getElementById('descViews').textContent=v.toLocaleString('th-TH')+' ครั้ง';},1500);
  let live=Math.floor(base/900)+Math.floor(Math.random()*500);
  document.getElementById('liveCount').textContent=live.toLocaleString('th-TH');
  liveInterval=setInterval(()=>{live+=Math.floor(Math.random()*21)-8;if(live<10)live=10;
    document.getElementById('liveCount').textContent=live.toLocaleString('th-TH');},2200);
}
function stopCounters(){if(viewInterval)clearInterval(viewInterval);if(liveInterval)clearInterval(liveInterval);viewInterval=liveInterval=null;}

/* ============ ENGAGEMENT ============ */
function toggleSub(){subbed[movies[currentIdx].ch]=!subbed[movies[currentIdx].ch];updateSubUI();
  toast(subbed[movies[currentIdx].ch]?'ติดตามช่องแล้ว ✓':'เลิกติดตามแล้ว');}
function updateSubUI(){const b=document.getElementById('subBtn'),on=subbed[movies[currentIdx].ch];
  b.classList.toggle('subbed',on);b.textContent=on?'ติดตามแล้ว ✓':'ติดตาม';}
function toggleLike(){liked[currentIdx]=!liked[currentIdx];if(liked[currentIdx])disliked[currentIdx]=false;updateLikeUI();
  toast(liked[currentIdx]?'ถูกใจวิดีโอนี้ 👍':'นำการถูกใจออกแล้ว');}
function toggleDislike(){disliked[currentIdx]=!disliked[currentIdx];if(disliked[currentIdx])liked[currentIdx]=false;updateLikeUI();}
function updateLikeUI(){
  document.getElementById('likeBtn').classList.toggle('on',!!liked[currentIdx]);
  document.getElementById('dislikeBtn').classList.toggle('on',!!disliked[currentIdx]);
  const m=movies[currentIdx];document.getElementById('likeCount').textContent=vfmt(m.likes+(liked[currentIdx]?1:0));
}
function toggleSave(){saved[currentIdx]=!saved[currentIdx];updateSaveUI();
  toast(saved[currentIdx]?'บันทึกไว้ดูภายหลัง ✓':'นำออกจากรายการแล้ว');}
function updateSaveUI(){const b=document.getElementById('saveBtn');b.classList.toggle('saved',!!saved[currentIdx]);
  document.getElementById('saveText').textContent=saved[currentIdx]?'บันทึกแล้ว':'บันทึก';}

/* ============ SHARE ============ */
function toggleShare(e){e.stopPropagation();const p=document.getElementById('sharePop');
  p.style.display=p.style.display==='block'?'none':'block';}
function share(p){const m=movies[currentIdx];
  const url=location.href.split('#')[0]+'#movie='+currentIdx;
  const text=`ดู "${m.th}" (${m.en}) บน AURUM`;let link='';
  if(p==='fb')link='https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url);
  else if(p==='line')link='https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(url);
  else if(p==='x')link='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url);
  if(p==='copy'){copyText(url);}else{window.open(link,'_blank','width=600,height=520');}
  document.getElementById('sharePop').style.display='none';
}
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>toast('คัดลอกลิงก์แล้ว ✓')).catch(()=>fb());}else fb();
  function fb(){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('คัดลอกลิงก์แล้ว ✓');}catch(e){toast('ไม่สามารถคัดลอกได้');}document.body.removeChild(ta);}}

/* ============ DESCRIPTION ============ */
function toggleDesc(){const b=document.getElementById('descBody');b.classList.toggle('open');
  document.getElementById('descMore').textContent=b.classList.contains('open')?'แสดงน้อยลง':'...เพิ่มเติม';}

      <div class="cmt-acts">
        <span onclick="toast('ขอบคุณสำหรับการโหวต 👍')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10v11M2 13v6a2 2 0 0 0 2 2h12.3a2 2 0 0 0 2-1.6l1.4-7A2 2 0 0 0 17.7 10H13l1-4.5A2 2 0 0 0 12 3l-5 7"/></svg>${c.l}</span>
        <span onclick="toast('โหวตแล้ว')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 14V3M22 11V5a2 2 0 0 0-2-2H7.7a2 2 0 0 0-2 1.6l-1.4 7A2 2 0 0 0 6.3 14H11l-1 4.5A2 2 0 0 0 12 21l5-7"/></svg></span>
        <span onclick="document.getElementById('cmtInput').focus()">ตอบกลับ</span>
      </div>
    </div>
  </div>`;}
function sendCmt(){const inp=document.getElementById('cmtInput');const v=inp.value.trim();if(!v)return;
  sampleComments.unshift({n:"ก. คุณ",t:"เมื่อสักครู่",x:v,l:"0"});
  renderComments();inp.value='';document.getElementById('cmtBtns').style.display='none';
  document.getElementById('cmtCount').textContent=`${(sampleComments.length).toLocaleString('th-TH')} ความคิดเห็น`;
  toast('แสดงความคิดเห็นแล้ว ✓');}
function cancelCmt(){document.getElementById('cmtInput').value='';document.getElementById('cmtBtns').style.display='none';}

/* ============ TOAST ============ */
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2300);}

/* ============ SEARCH ============ */
function doSearch(){const q=(document.getElementById('searchInput').value||'').trim();
  goHome();if(!q){renderGrid();return;}
  const list=movies.map((m,i)=>({m,i})).filter(o=>
    (o.m.th+o.m.en+o.m.genre+studios[o.m.ch]).toLowerCase().includes(q.toLowerCase()));
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('grid').innerHTML=list.length?list.map(o=>vcardHTML(o.m,o.i)).join('')
    :`<p style="color:var(--muted);padding:40px">ไม่พบผลลัพธ์สำหรับ "${q}"</p>`;
  toast(`ผลการค้นหา: ${list.length} รายการ`);}

/* ============ VIDEO PLAYER ============ */
const video=document.getElementById('video');
function resetPlayerUI(){try{video.pause();video.currentTime=0;}catch(e){}
  document.getElementById('posterFb').classList.remove('hidden');setPlayIcon(false);
  document.getElementById('filled').style.width='0%';document.getElementById('knob').style.left='0%';
  document.getElementById('cur').textContent='0:00';document.getElementById('stage').classList.remove('theater');}
function stopPlayer(){try{video.pause();}catch(e){}stopCounters();}
function togglePlay(){if(video.paused){video.play().then(()=>document.getElementById('posterFb').classList.add('hidden'))
    .catch(()=>{toast('ไม่สามารถเล่นวิดีโอตัวอย่างในสภาพแวดล้อมนี้');document.getElementById('posterFb').classList.add('hidden');});}
  else video.pause();}
function setPlayIcon(p){document.getElementById('playIcon').innerHTML=p?'<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>':'<path d="M8 5v14l11-7z"/>';}
video.addEventListener('play',()=>{setPlayIcon(true);document.getElementById('posterFb').classList.add('hidden');});
video.addEventListener('pause',()=>setPlayIcon(false));
video.addEventListener('timeupdate',()=>{if(!video.duration)return;const p=video.currentTime/video.duration*100;
  document.getElementById('filled').style.width=p+'%';document.getElementById('knob').style.left=p+'%';
  document.getElementById('cur').textContent=tf(video.currentTime);});
video.addEventListener('loadedmetadata',()=>document.getElementById('dur').textContent=tf(video.duration));
video.addEventListener('ended',()=>{setPlayIcon(false);document.getElementById('posterFb').classList.remove('hidden');});
function tf(s){s=Math.floor(s||0);const m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}
function seek(e){const r=e.currentTarget.getBoundingClientRect();const pct=(e.clientX-r.left)/r.width;
  if(video.duration)video.currentTime=pct*video.duration;}
function skip(s){video.currentTime=Math.max(0,Math.min(video.duration||0,video.currentTime+s));}
function setVol(v){video.volume=v;video.muted=v==0;updateVolIcon();}
function toggleMute(){video.muted=!video.muted;document.getElementById('volume').value=video.muted?0:video.volume;updateVolIcon();}
function updateVolIcon(){document.getElementById('volIcon').innerHTML=(video.muted||video.volume==0)
    ?'<path d="M11 5 6 9H2v6h4l5 4z"/><path d="M22 9l-6 6M16 9l6 6" fill="none" stroke="currentColor" stroke-width="2"/>'
    :'<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="2"/>';}
function toggleMenu(id){document.querySelectorAll('.menu-pop').forEach(m=>{if(m.id!==id)m.classList.remove('open');if(m.id!=='sharePop'&&m.id!==id)m.style.display='';});
  const el=document.getElementById(id);el.classList.toggle('open');}
function setQuality(b,l){b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
  document.getElementById('qMenu').classList.remove('open');toast('ความคมชัด: '+l);}
function setSpeed(b,r){b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
  video.playbackRate=r;document.getElementById('sMenu').classList.remove('open');toast('ความเร็ว: '+(r===1?'ปกติ':r+'x'));}
let ccOn=false;
function toggleCC(){ccOn=!ccOn;document.getElementById('ccBtn').classList.toggle('active',ccOn);
  document.getElementById('capBox').classList.toggle('show',ccOn);toast(ccOn?'เปิดซับไตเติล (ไทย)':'ปิดซับไตเติล');}
function toggleTheater(){const s=document.getElementById('stage');s.classList.toggle('theater');
  document.getElementById('theaterBtn').classList.toggle('active',s.classList.contains('theater'));}
function toggleFullscreen(){const s=document.getElementById('stage');
  if(!document.fullscreenElement){(s.requestFullscreen||s.webkitRequestFullscreen).call(s).catch(()=>toast('ไม่รองรับเต็มจอ'));}
  else document.exitFullscreen();}

/* ============ SIDEBAR / MOBILE ============ */
function isMobile(){return window.matchMedia('(max-width:768px)').matches;}
function isTablet(){return window.matchMedia('(max-width:1000px)').matches;}
function toggleSidebar(){
  if(isMobile()||isTablet()){
    document.body.classList.toggle('mside-open');
    document.getElementById('scrim').classList.toggle('show',document.body.classList.contains('mside-open'));
    document.body.classList.toggle('no-scroll',document.body.classList.contains('mside-open'));
  }else{
    document.body.classList.toggle('side-collapsed');
  }
}
function closeMobileSidebar(){document.body.classList.remove('mside-open');
  document.getElementById('scrim').classList.remove('show');document.body.classList.remove('no-scroll');}

/* close popups on outside click */
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu'))document.querySelectorAll('.menu-pop').forEach(m=>{m.classList.remove('open');});
  if(!e.target.closest('.menu')&&!e.target.closest('.pill'))document.getElementById('sharePop').style.display='none';
});

/* keyboard shortcuts */
document.addEventListener('keydown',e=>{
  if(!document.body.classList.contains('view-watch'))return;
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  else if(e.code==='ArrowRight')skip(5);
  else if(e.code==='ArrowLeft')skip(-5);
  else if(e.key==='f')toggleFullscreen();
  else if(e.key==='t')toggleTheater();
});

window.addEventListener('resize',()=>{if(!isMobile()&&!isTablet())closeMobileSidebar();});

/* ============ INIT ============ */
buildChips();
renderGrid();
updateVolIcon();
if(isTablet())document.body.classList.add('side-collapsed');
</script>
</body>
